name: Community Event Submission
description: Submit a PowerShell-related event for the community calendar
title: "[Event] "
labels: ["calendar", "community-event"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting an event to the PowerShell.org community calendar!
        Please fill out the details below. A maintainer will review and approve it.

  - type: input
    id: event_name
    attributes:
      label: Event Name
      placeholder: "e.g., PowerShell Saturday Austin"
    validations:
      required: true

  - type: input
    id: event_url
    attributes:
      label: Event Website
      placeholder: "https://..."
    validations:
      required: true

  - type: input
    id: start_date
    attributes:
      label: Start Date
      description: "Format: YYYY-MM-DD"
      placeholder: "2026-10-15"
    validations:
      required: true

  - type: input
    id: end_date
    attributes:
      label: End Date
      description: "Format: YYYY-MM-DD — leave blank for single-day events"
      placeholder: "2026-10-17"
    validations:
      required: false

  - type: input
    id: location
    attributes:
      label: Location
      description: "City, State/Country — use 'Virtual' for online-only events"
      placeholder: "Austin, TX"
    validations:
      required: true

  - type: dropdown
    id: virtual
    attributes:
      label: Is this a virtual event?
      options:
        - "No"
        - "Yes"
        - "Hybrid (in-person + virtual)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Event Description
      description: "1–2 sentences shown on the calendar page."
      placeholder: "Brief description of the event."
    validations:
      required: true
